<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意见反馈 - 校园服务平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link-style {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 15px;
        }
        .nav-link-style:hover { background-color: #0D47A1; color: white !important; }
    </style>
</head>
<body style="background: linear-gradient(to bottom, #e6f7e6, #ffffff); min-height: 100vh; margin:0;">

<nav class="px-4" style="background: linear-gradient(to bottom, #165DFF, #90caf9); height: 80px;">
    <div class="d-flex justify-content-between align-items-center h-100">
        <a href="/dashboard" class="text-white text-decoration-none fs-2 fw-bold">校园服务平台</a>
        <div class="d-flex gap-4">
            <a href="/" class="nav-link-style">登录</a>
            <a href="/dashboard" class="nav-link-style">首页</a>
            <a href="/schedule" class="nav-link-style">课表</a>
            <a href="/tasks" class="nav-link-style">DDL任务</a>
            <a href="/seat" class="nav-link-style">座位预约</a>
            <a href="/logs" class="nav-link-style">操作日志</a>
            <a href="/profile" class="nav-link-style">个人中心</a>
            <a href="/feedback" class="nav-link-style">意见反馈</a>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4 shadow-sm">
                <h3 class="text-center mb-4">提交意见反馈</h3>
                
                <div class="mb-3">
                    <label class="form-label">反馈类型</label>
                    <select id="feedbackType" class="form-control">
                        <option value="seat">抢座问题</option>
                        <option value="schedule">课表问题</option>
                        <option value="task">任务问题</option>
                        <option value="ui">界面优化</option>
                        <option value="feature">功能建议</option>
                        <option value="bug">Bug反馈</option>
                        <option value="other">其他</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">标题（可选）</label>
                    <input id="feedbackTitle" type="text" class="form-control" placeholder="简短描述问题">
                </div>

                <div class="mb-3">
                    <label class="form-label">联系邮箱（可选）</label>
                    <input id="contactEmail" type="email" class="form-control" placeholder="方便我们回复您">
                </div>

                <div class="mb-3">
                    <label class="form-label">反馈内容</label>
                    <textarea id="feedbackContent" rows="6" class="form-control" placeholder="请详细描述你的问题或建议"></textarea>
                </div>

                <button class="btn btn-primary w-100 py-2" id="submitFeedbackBtn">提交反馈</button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 shadow-sm">
                <h3 class="text-center mb-4">我的反馈记录</h3>
                <div id="feedbackDetail" class="alert alert-light border d-none mb-3"></div>
                <div id="myFeedbackList">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a href="/dashboard" class="btn btn-outline-primary">返回首页</a>
    </div>
</div>

<script type="module" src="/static/feedback.js"></script>
</body>
</html>
