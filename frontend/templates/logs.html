<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统操作日志 - 校园服务平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link-style {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 15px;
        }
        .nav-link-style:hover { background-color: #0D47A1; color: white !important; }
    </style>
</head>
<body style="background: linear-gradient(to bottom, #e6f7e6, #ffffff); min-height: 100vh; margin:0;">

<nav class="px-4" style="background: linear-gradient(to bottom, #165DFF, #90caf9); height: 80px;">
    <div class="d-flex justify-content-between align-items-center h-100">
        <a href="/dashboard" class="text-white text-decoration-none fs-2 fw-bold">校园服务平台</a>
        <div class="d-flex gap-4">
            <a href="/" class="nav-link-style">登录</a>
            <a href="/dashboard" class="nav-link-style">首页</a>
            <a href="/schedule" class="nav-link-style">课表</a>
            <a href="/tasks" class="nav-link-style">DDL任务</a>
            <a href="/seat" class="nav-link-style">座位预约</a>
            <a href="/logs" class="nav-link-style">操作日志</a>
            <a href="/profile" class="nav-link-style">个人中心</a>
            <a href="/feedback" class="nav-link-style">意见反馈</a>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">全量操作日志记录</h3>
        <div class="d-flex gap-2">
            <button class="btn btn-primary btn-sm" id="filterAll">全部日志</button>
            <button class="btn btn-danger btn-sm" id="filterError">错误日志</button>
        </div>
    </div>

    <div class="card p-4">
        <div class="mb-3">
            <span class="badge bg-success">INFO</span>
            <span class="badge bg-warning">WARN</span>
            <span class="badge bg-danger">ERROR</span>
            <span class="badge bg-secondary">DEBUG</span>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered" id="logTable">
                <thead class="table-dark">
                    <tr>
                        <th style="width:180px;">时间</th>
                        <th style="width:100px;">模块</th>
                        <th style="width:80px;">级别</th>
                        <th>详情</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a href="/dashboard" class="btn btn-outline-primary">返回首页</a>
        <a href="/profile" class="btn btn-outline-secondary">前往个人中心</a>
    </div>
</div>

<script type="module" src="/static/logs.js"></script>
</body>
</html>
