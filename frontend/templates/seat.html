
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆座位预约</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .seat{width:35px;height:35px;display:inline-block;margin:4px;border-radius:4px;cursor:pointer;text-align:center;line-height:35px;font-size:13px;}
        .free{background:#90ee90;border:1px solid #28a745;}
        .used{background:#cccccc;border:1px solid #888;cursor:not-allowed;}
        .select{background:#4285f4;color:#fff;}
    </style>
</head>
<body style="background: linear-gradient(to bottom, #e6f7e6, #ffffff); min-height: 100vh; margin:0;">

<nav class="px-4" style="background: linear-gradient(to bottom, #165DFF, #90caf9); height: 80px;">
    <div class="d-flex justify-content-between align-items-center h-100">
        <a href="dashboard.html" class="text-white text-decoration-none fs-2 fw-bold">校园服务平台</a>
        <div class="d-flex gap-4">
            <a href="login.html" class="nav-link-style">登录</a>
            <a href="dashboard.html" class="nav-link-style">首页</a>
            <a href="schedule.html" class="nav-link-style">课表</a>
            <a href="tasks.html" class="nav-link-style">DDL任务</a>
            <a href="seat.html" class="nav-link-style">座位预约</a>
            <a href="logs.html" class="nav-link-style">操作日志</a>
            <a href="profile.html" class="nav-link-style">个人中心</a>
            <a href="feedback.html" class="nav-link-style">意见反馈</a>
        </div>
    </div>
</nav>

<style>
.nav-link-style {
    color: #ffffff;
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-weight: 500;
    font-size: 15px;
}
.nav-link-style:hover {
    background-color: #0D47A1;
    color: white !important;
}
</style>

<div class="container mt-5">
    <h3 class="text-center mb-4">图书馆自习室座位预约</h3>
    <div class="row">
        <div class="col-md-7 border p-4 rounded">
            <p>图例：<span class="seat free">空</span>空闲座位 &nbsp;<span class="seat used">占</span>已预约 &nbsp;<span class="seat select">选</span>已选中</p>
            <div id="seatBox">
                <div>A排：<div class="seat free" data-no="A1">A1</div><div class="seat free" data-no="A2">A2</div><div class="seat used" data-no="A3">A3</div><div class="seat free" data-no="A4">A4</div><div class="seat free" data-no="A5">A5</div></div>
                <div class="mt-2">B排：<div class="seat used" data-no="B1">B1</div><div class="seat free" data-no="B2">B2</div><div class="seat free" data-no="B3">B3</div><div class="seat used" data-no="B4">B4</div><div class="seat free" data-no="B5">B5</div></div>
                <div class="mt-2">C排：<div class="seat free" data-no="C1">C1</div><div class="seat free" data-no="C2">C2</div><div class="seat free" data-no="C3">C3</div><div class="seat free" data-no="C4">C4</div><div class="seat used" data-no="C5">C5</div></div>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card p-3">
                <h5>预约信息</h5>
                <p>已选座位：<span id="chooseSeat">暂无</span></p>
                <div class="mt-3">
                    <label>预约日期</label>
                    <input type="date" class="form-control mb-2" id="bookDate">
                    <label>使用时段</label>
                    <select class="form-select mb-3" id="bookTime">
                        <option>上午 08:30-12:00</option>
                        <option>下午 14:00-17:30</option>
                        <option>全天 08:30-17:30</option>
                    </select>
                </div>
                <button class="btn btn-success w-100" id="submitBtn">确认预约</button>
                <div class="mt-3">
                    <a href="dashboard.html" class="btn btn-outline-primary w-100">返回首页</a>
                    <a href="schedule.html" class="btn btn-outline-secondary w-100 mt-2">查看课表</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let selected = [];
const seatList = document.querySelectorAll('.seat.free');
const showDom = document.getElementById('chooseSeat');
const submitBtn = document.getElementById('submitBtn');

seatList.forEach(item=>{
    item.onclick = ()=>{
        let num = item.dataset.no;
        if(item.classList.contains('select')){
            item.classList.remove('select');
            selected = selected.filter(s=>s!==num);
        }else{
            item.classList.add('select');
            selected.push(num);
        }
        showDom.innerText = selected.length>0 ? selected.join('、') : '暂无';
    }
})

submitBtn.onclick = ()=>{
    if(selected.length===0){
        alert('请先选择座位！');
        return;
    }
    alert(`预约成功！座位：${selected.join('、')}`);
}
</script>
<script type="module" src="../static/js/seat.js"></script>
</body>
</html>
