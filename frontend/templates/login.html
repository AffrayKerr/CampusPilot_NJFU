<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - 校园服务平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link-style {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 15px;
        }
        .nav-link-style:hover {
            background-color: #0D47A1;
            color: white !important;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
        }
        .tab-btn {
            cursor: pointer;
            padding: 8px 28px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 500;
            color: #888;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: #165DFF;
            border-bottom: 2px solid #165DFF;
        }
    </style>
</head>
<body style="
    background-image: url('/static/bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    margin: 0;
">

<nav class="px-4" style="background: linear-gradient(to bottom, #165DFF, #90caf9); height: 80px;">
    <div class="d-flex justify-content-between align-items-center h-100">
        <a href="/dashboard" class="text-white text-decoration-none fs-2 fw-bold">校园服务平台</a>
        <div class="d-flex gap-4">
            <a href="/" class="nav-link-style">登录</a>
            <a href="/dashboard" class="nav-link-style">首页</a>
            <a href="/schedule" class="nav-link-style">课表</a>
            <a href="/tasks" class="nav-link-style">DDL任务</a>
            <a href="/seat" class="nav-link-style">座位预约</a>
            <a href="/logs" class="nav-link-style">操作日志</a>
            <a href="/profile" class="nav-link-style">个人中心</a>
            <a href="/feedback" class="nav-link-style">意见反馈</a>
        </div>
    </div>
</nav>

<div class="login-container">
    <div class="card p-5 shadow-lg" style="width: 520px; background: rgba(255,255,255,0.95);">
        <div class="d-flex justify-content-center mb-4 border-bottom">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登录</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注册</button>
        </div>

        <div id="username-group" class="mb-4">
            <label class="form-label fs-5">用户名</label>
            <input type="text" id="username" class="form-control form-control-lg" placeholder="请输入用户名">
        </div>

        <div id="email-group" class="mb-4" style="display:none;">
            <label class="form-label fs-5">邮箱（可选）</label>
            <input type="email" id="email" class="form-control form-control-lg" placeholder="请输入邮箱">
        </div>

        <div class="mb-4">
            <label class="form-label fs-5">密码</label>
            <input type="password" id="password" class="form-control form-control-lg" placeholder="请输入密码（至少6位）">
        </div>

        <button class="btn btn-primary w-100 py-3 fs-5" id="loginBtn">立即登录</button>
        <button class="btn btn-success w-100 py-3 fs-5" id="registerBtn" style="display:none;">注册账号</button>

        <p class="text-center text-muted mt-3 mb-0" style="font-size:13px;">
            注意：校园网账号在登录后前往个人中心绑定
        </p>
    </div>
</div>

<script>
function switchTab(tab) {
    const emailGroup = document.getElementById("email-group")
    const loginBtn = document.getElementById("loginBtn")
    const registerBtn = document.getElementById("registerBtn")
    const tabLogin = document.getElementById("tabLogin")
    const tabRegister = document.getElementById("tabRegister")

    if (tab === "login") {
        emailGroup.style.display = "none"
        loginBtn.style.display = "block"
        registerBtn.style.display = "none"
        tabLogin.classList.add("active")
        tabRegister.classList.remove("active")
    } else {
        emailGroup.style.display = "block"
        loginBtn.style.display = "none"
        registerBtn.style.display = "block"
        tabLogin.classList.remove("active")
        tabRegister.classList.add("active")
    }
}
</script>
<script type="module" src="/static/login.js"></script>
</body>
</html>
