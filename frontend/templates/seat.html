<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆座位预约 - 校园服务平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link-style {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 15px;
        }
        .nav-link-style:hover { background-color: #0D47A1; color: white !important; }
    </style>
</head>
<body style="background: linear-gradient(to bottom, #e6f7e6, #ffffff); min-height: 100vh; margin:0;">

<nav class="px-4" style="background: linear-gradient(to bottom, #165DFF, #90caf9); height: 80px;">
    <div class="d-flex justify-content-between align-items-center h-100">
        <a href="/dashboard" class="text-white text-decoration-none fs-2 fw-bold">校园服务平台</a>
        <div class="d-flex gap-4">
            <a href="/" class="nav-link-style">登录</a>
            <a href="/dashboard" class="nav-link-style">首页</a>
            <a href="/schedule" class="nav-link-style">课表</a>
            <a href="/tasks" class="nav-link-style">DDL任务</a>
            <a href="/seat" class="nav-link-style">座位预约</a>
            <a href="/logs" class="nav-link-style">操作日志</a>
            <a href="/profile" class="nav-link-style">个人中心</a>
            <a href="/feedback" class="nav-link-style">意见反馈</a>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">图书馆自习室座位预约</h3>
        <div class="d-flex gap-2 align-items-center">
            <span class="me-2">Worker状态：<span id="workerStatus" class="badge bg-secondary">未知</span></span>
            <button class="btn btn-primary btn-sm" id="reserveNowBtn">立刻抢座</button>
            <button class="btn btn-success btn-sm" id="startWorkerBtn">启动抢座</button>
            <button class="btn btn-danger btn-sm" id="stopWorkerBtn">停止抢座</button>
        </div>
    </div>

    <div id="seatWorkerMessage" class="alert alert-info d-none" role="status"></div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4">
                <h5>添加座位配置</h5>
                <div class="mb-3">
                    <label for="seatFloor">楼层</label>
                    <select id="seatFloor" class="form-control">
                        <option value="2F">图书馆二层</option>
                        <option value="3F">图书馆三层</option>
                        <option value="4F" selected>图书馆四层</option>
                        <option value="5F">图书馆五层</option>
                        <option value="6F">图书馆六层</option>
                        <option value="7F">图书馆七层</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>座位号</label>
                    <input type="text" id="seatNo" class="form-control" placeholder="如：A203">
                </div>
                <div class="mb-3">
                    <label>预约日期</label>
                    <input type="date" id="reserveDate" class="form-control">
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label>开始时间</label>
                        <input type="time" id="startTime" class="form-control" value="07:30">
                    </div>
                    <div class="col-6">
                        <label>结束时间</label>
                        <input type="time" id="endTime" class="form-control" value="22:00">
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label>检查开始</label>
                        <input type="time" id="checkStart" class="form-control" value="07:00">
                    </div>
                    <div class="col-6">
                        <label>检查结束</label>
                        <input type="time" id="checkStop" class="form-control" value="08:10">
                    </div>
                </div>
                <div class="mb-3">
                    <label>优先级（数字越小越优先）</label>
                    <input type="number" id="priority" class="form-control" value="1" min="1">
                </div>
                <button class="btn btn-primary w-100" id="addConfigBtn">添加候选座位</button>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h5>候选座位列表</h5>
                <table class="table table-sm" id="configTable">
                    <thead>
                        <tr>
                            <th>楼层/座位</th>
                            <th>日期</th>
                            <th>时间段</th>
                            <th>状态</th>
                            <th>优先级</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" class="text-center text-muted">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="seatConfigDetailModal" tabindex="-1" aria-labelledby="seatConfigDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="seatConfigDetailModalLabel">候选座位详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="seatConfigDetailContent" class="small text-muted">暂无数据</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="seatConfigEditModal" tabindex="-1" aria-labelledby="seatConfigEditModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="seatConfigEditModalLabel">编辑候选座位</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="seatConfigEditForm">
                        <input type="hidden" id="editConfigId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="editSeatFloor" class="form-label">楼层</label>
                                <select id="editSeatFloor" class="form-control">
                                    <option value="2F">图书馆二层</option>
                                    <option value="3F">图书馆三层</option>
                                    <option value="4F">图书馆四层</option>
                                    <option value="5F">图书馆五层</option>
                                    <option value="6F">图书馆六层</option>
                                    <option value="7F">图书馆七层</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="editSeatNo" class="form-label">座位号</label>
                                <input type="text" id="editSeatNo" class="form-control" placeholder="如：A203">
                            </div>
                            <div class="col-md-6">
                                <label for="editReserveDate" class="form-label">预约日期</label>
                                <input type="date" id="editReserveDate" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="editPriority" class="form-label">优先级</label>
                                <input type="number" id="editPriority" class="form-control" value="1" min="1">
                            </div>
                            <div class="col-md-6">
                                <label for="editStartTime" class="form-label">开始时间</label>
                                <input type="time" id="editStartTime" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="editEndTime" class="form-label">结束时间</label>
                                <input type="time" id="editEndTime" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="editCheckStart" class="form-label">检查开始</label>
                                <input type="time" id="editCheckStart" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="editCheckStop" class="form-label">检查结束</label>
                                <input type="time" id="editCheckStop" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label for="editRetryInterval" class="form-label">重试间隔（秒）</label>
                                <input type="number" id="editRetryInterval" class="form-control" value="10" min="1">
                            </div>
                            <div class="col-md-4">
                                <label for="editMaxRetryCount" class="form-label">最大重试次数</label>
                                <input type="number" id="editMaxRetryCount" class="form-control" value="30" min="1">
                            </div>
                            <div class="col-md-4">
                                <label for="editMaxDurationMinutes" class="form-label">最长运行时长（分钟）</label>
                                <input type="number" id="editMaxDurationMinutes" class="form-control" value="15" min="1">
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="editEnabled">
                                    <label class="form-check-label" for="editEnabled">启用该候选座位</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" id="resetEditConfigBtn">恢复原值</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveEditConfigBtn">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a href="/dashboard" class="btn btn-outline-primary">返回首页</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/static/seat.js"></script>
</body>
</html>
