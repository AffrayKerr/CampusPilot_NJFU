<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课表查询 - 校园服务平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .nav-link-style {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 15px;
        }
        .nav-link-style:hover { background-color: #0D47A1; color: white !important; }
    </style>
</head>
<body style="background: linear-gradient(to bottom, #e6f7e6, #ffffff); min-height: 100vh; margin:0;">

<nav class="px-4" style="background: linear-gradient(to bottom, #165DFF, #90caf9); height: 80px;">
    <div class="d-flex justify-content-between align-items-center h-100">
        <a href="/dashboard" class="text-white text-decoration-none fs-2 fw-bold">校园服务平台</a>
        <div class="d-flex gap-4">
            <a href="/" class="nav-link-style">登录</a>
            <a href="/dashboard" class="nav-link-style">首页</a>
            <a href="/schedule" class="nav-link-style">课表</a>
            <a href="/tasks" class="nav-link-style">DDL任务</a>
            <a href="/seat" class="nav-link-style">座位预约</a>
            <a href="/logs" class="nav-link-style">操作日志</a>
            <a href="/profile" class="nav-link-style">个人中心</a>
            <a href="/feedback" class="nav-link-style">意见反馈</a>
        </div>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">课表 / 日程 <small id="currentWeekText" class="text-muted fs-6 ms-2"></small></h3>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" id="syncScheduleBtn">同步课表</button>
            <button class="btn btn-warning" id="syncExamBtn">同步考试</button>
            <button class="btn btn-outline-secondary" id="detectChangesBtn">检测变动</button>
        </div>
    </div>

    <div id="scheduleStatus" class="alert d-none mb-3" role="status"></div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-3">
                <h6 class="fw-bold mb-3">今日课程</h6>
                <div id="scheduleList">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <h6 class="fw-bold mb-3">本月考试</h6>
                <div id="examList">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3">
                <h6 class="fw-bold mb-3">待办任务</h6>
                <div id="taskList">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card p-3 mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0">下周课表 <small id="nextWeekText" class="text-muted ms-2"></small></h6>
            <button class="btn btn-sm btn-outline-primary" id="refreshNextWeekBtn">刷新下周课表</button>
        </div>
        <div id="nextWeekSchedule" class="row g-3">
            <p class="text-muted mb-0">加载中...</p>
        </div>
    </div>

    <div class="mt-3">
        <a href="/dashboard" class="btn btn-outline-primary">返回首页</a>
    </div>
</div>

<script type="module" src="/static/schedule.js"></script>
</body>
</html>
